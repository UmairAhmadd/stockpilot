<svg width="900" height="760" viewBox="0 0 900 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="alu" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0" stop-color="#5b5e64"/>
      <stop offset="0.18" stop-color="#474a50"/>
      <stop offset="0.55" stop-color="#303338"/>
      <stop offset="1" stop-color="#191a1e"/>
    </linearGradient>
    <linearGradient id="aluR" x1="1" y1="0" x2="0.75" y2="1">
      <stop offset="0" stop-color="#5b5e64"/>
      <stop offset="0.18" stop-color="#474a50"/>
      <stop offset="0.55" stop-color="#303338"/>
      <stop offset="1" stop-color="#191a1e"/>
    </linearGradient>
    <radialGradient id="cushion" cx="0.42" cy="0.36" r="0.75">
      <stop offset="0" stop-color="#3a3c42"/>
      <stop offset="0.6" stop-color="#27282d"/>
      <stop offset="1" stop-color="#141519"/>
    </radialGradient>
    <linearGradient id="canopy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#43464c"/>
      <stop offset="1" stop-color="#222328"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dadde2"/>
      <stop offset="0.5" stop-color="#9a9da3"/>
      <stop offset="1" stop-color="#6c6f75"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="knit" width="13" height="13" patternUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="1.5" fill="#5a5d63" opacity="0.32"/>
      <circle cx="10" cy="10" r="1.5" fill="#5a5d63" opacity="0.32"/>
    </pattern>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- stainless steel frame (under canopy, peeks near the stems) -->
  <path d="M 250 372 C 250 175, 650 175, 650 372" fill="none" stroke="url(#steel)" stroke-width="17" stroke-linecap="round"/>

  <!-- telescoping steel stems into each cup -->
  <g stroke="url(#steel)" stroke-linecap="round" fill="none">
    <path d="M 268 360 L 300 410" stroke-width="17"/>
    <path d="M 632 360 L 600 410" stroke-width="17"/>
  </g>

  <!-- padded knit canopy headband -->
  <path d="M 262 366 C 262 158, 638 158, 638 366" fill="none" stroke="url(#canopy)" stroke-width="54" stroke-linecap="round"/>
  <path d="M 262 366 C 262 158, 638 158, 638 366" fill="none" stroke="url(#knit)" stroke-width="54" stroke-linecap="round"/>
  <path d="M 272 356 C 280 196, 620 196, 628 356" fill="none" stroke="url(#sheen)" stroke-width="9" stroke-linecap="round" opacity="0.5"/>

  <!-- LEFT ear cup -->
  <g>
    <rect x="212" y="398" width="178" height="214" rx="74" fill="url(#alu)"/>
    <rect x="212" y="398" width="178" height="214" rx="74" fill="none" stroke="url(#sheen)" stroke-width="2.5" opacity="0.7"/>
    <rect x="232" y="420" width="138" height="170" rx="60" fill="#101114"/>
    <rect x="240" y="428" width="122" height="154" rx="54" fill="url(#cushion)"/>
    <rect x="240" y="428" width="122" height="154" rx="54" fill="url(#knit)"/>
    <ellipse cx="276" cy="452" rx="40" ry="30" fill="#ffffff" opacity="0.06" filter="url(#soft)"/>
  </g>

  <!-- RIGHT ear cup (outer aluminium face + crown) -->
  <g>
    <rect x="510" y="398" width="178" height="214" rx="74" fill="url(#aluR)"/>
    <rect x="510" y="398" width="178" height="214" rx="74" fill="none" stroke="url(#sheen)" stroke-width="2.5" opacity="0.7"/>
    <ellipse cx="599" cy="505" rx="64" ry="82" fill="#000000" opacity="0.18" filter="url(#soft)"/>
    <ellipse cx="572" cy="452" rx="46" ry="34" fill="#ffffff" opacity="0.10" filter="url(#soft)"/>
    <!-- digital crown + noise button -->
    <rect x="612" y="384" width="34" height="15" rx="7" fill="url(#steel)"/>
    <rect x="566" y="386" width="20" height="12" rx="6" fill="#3a3c42"/>
  </g>
</svg>